{% extends 'base.html' %}





{% block contenu %}
<div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0">
          <div class="card-header bg-primary text-white text-center fs-4 fw-bold">
            Connexion
          </div>
          <div class="card-body">

            <form action="{% url 'connexion' %}" method="post">
              {% csrf_token %}
              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Adresse email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Ex : nom@exemple.com" required>
              </div>

              <!-- Mot de passe -->
              <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Votre mot de passe" required>
              </div>

              <!-- Se souvenir de moi -->
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Se souvenir de moi</label>
              </div>

              <!-- Bouton de connexion -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Se connecter</button>
              </div>

              <!-- Lien mot de passe oublié -->
              <div class="mt-3 text-center">
                <a href="#">Mot de passe oublié ?</a>
              </div>

              <!-- Lien vers inscription -->
              <div class="mt-2 text-center">
                <small>Pas encore inscrit ? <a href="{% url 'inscription' %}">Créer un compte</a></small>
              </div>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>


{% include 'footer.html' %}
{% endblock %}
